name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  bats:
    name: BATS (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y ripgrep shellcheck

      - name: Install macOS dependencies
        if: runner.os == 'macOS'
        run: |
          brew install bash ripgrep shellcheck python
          echo "$(brew --prefix)/bin" >> "$GITHUB_PATH"

      - name: Lint shell scripts
        run: shellcheck -x --severity=warning bin/okm bin/vim scripts/*.sh scripts/lib/*.sh scripts/hooks/pre-push

      - name: Run BATS test suite
        run: bash tests/run_all.sh --tap
